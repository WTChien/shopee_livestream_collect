<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopee Live 自動化控制面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-orange-600 shadow-lg px-6 py-4 flex items-center justify-between">
    <h1 class="text-2xl font-bold tracking-wide">🛒 Shopee Live 自動化控制面板</h1>
    <button id="refreshBtn"
      class="bg-white text-orange-600 font-semibold px-4 py-2 rounded-lg hover:bg-orange-50 transition">
      🔄 重新整理裝置
    </button>
  </header>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">

    <!-- Status bar -->
    <div id="statusBar" class="hidden bg-blue-800 text-blue-100 px-4 py-2 rounded-lg text-sm"></div>

    <!-- Device table -->
    <section class="bg-gray-900 rounded-2xl shadow-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-700 flex items-center justify-between">
        <h2 class="text-lg font-semibold">📱 已連接裝置</h2>
        <span id="deviceCount" class="text-sm text-gray-400">載入中…</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-800 text-gray-400 text-left uppercase text-xs tracking-wider">
              <th class="px-6 py-3">自訂名稱</th>
              <th class="px-6 py-3">ADB ID</th>
              <th class="px-6 py-3">狀態</th>
              <th class="px-6 py-3">蒐集次數</th>
              <th class="px-6 py-3">直播間數</th>
              <th class="px-6 py-3">自動化</th>
              <th class="px-6 py-3">改名</th>
            </tr>
          </thead>
          <tbody id="deviceTableBody">
            <tr>
              <td colspan="5" class="text-center py-10 text-gray-500">載入中，請稍候…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Rename form -->
    <section id="renameSection" class="hidden bg-gray-900 rounded-2xl shadow-xl px-6 py-5 space-y-3">
      <h2 class="text-lg font-semibold">✏️ 更新裝置名稱</h2>
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="renameSerial" type="text" placeholder="ADB ID（例：70f5e12）"
          class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500" />
        <input id="renameNickname" type="text" placeholder="新名稱（例：老媽的小米）"
          class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500" />
        <button id="renameBtn"
          class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-6 py-2 rounded-lg transition">
          儲存
        </button>
      </div>
      <p id="renameMsg" class="text-sm hidden"></p>
    </section>
    <!-- Log panel -->
    <section class="bg-gray-900 rounded-2xl shadow-xl px-6 py-5 space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">📝 裝置操作日誌</h2>
        <div class="flex items-center gap-3">
          <select id="logSerial"
            class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
            <option value="">— 選擇裝置 —</option>
          </select>
          <button id="clearLogBtn"
            class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-3 py-1.5 rounded-lg transition">
            清除顯示
          </button>
        </div>
      </div>
      <div id="logBox"
        class="bg-gray-950 rounded-xl p-4 h-64 overflow-y-auto font-mono text-xs space-y-1 border border-gray-800">
        <p class="text-gray-600">選擇裝置後會自動顯示日誌…</p>
      </div>
    </section>
  </main>

  <script>
    // original JS omitted for brevity in backup
  </script>
</body>
</html>
