<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopee Live 自動化控制面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-orange-600 shadow-lg px-6 py-4 flex items-center justify-between">
    <h1 class="text-2xl font-bold tracking-wide">🛒 Shopee Live 自動化控制面板</h1>
    <button id="refreshBtn"
      class="bg-white text-orange-600 font-semibold px-4 py-2 rounded-lg hover:bg-orange-50 transition">
      🔄 重新整理裝置
    </button>
  </header>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">

    <!-- Status bar -->
    <div id="statusBar" class="hidden bg-blue-800 text-blue-100 px-4 py-2 rounded-lg text-sm"></div>

    <!-- Device table -->
    <section class="bg-gray-900 rounded-2xl shadow-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-700 flex items-center justify-between">
        <h2 class="text-lg font-semibold">📱 已連接裝置</h2>
        <span id="deviceCount" class="text-sm text-gray-400">載入中…</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-800 text-gray-400 text-left uppercase text-xs tracking-wider">
              <th class="px-6 py-3">自訂名稱</th>
              <th class="px-6 py-3">ADB ID</th>
              <th class="px-6 py-3">狀態</th>
              <th class="px-6 py-3">蒐集次數</th>
              <th class="px-6 py-3">直播間數</th>
              <th class="px-6 py-3">自動化</th>
              <th class="px-6 py-3">改名</th>
            </tr>
          </thead>
          <tbody id="deviceTableBody">
            <tr>
              <td colspan="5" class="text-center py-10 text-gray-500">載入中，請稍候…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Rename form -->
    <section id="renameSection" class="hidden bg-gray-900 rounded-2xl shadow-xl px-6 py-5 space-y-3">
      <h2 class="text-lg font-semibold">✏️ 更新裝置名稱</h2>
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="renameSerial" type="text" placeholder="ADB ID（例：70f5e12）"
          class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500" />
        <input id="renameNickname" type="text" placeholder="新名稱（例：老媽的小米）"
          class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500" />
        <button id="renameBtn"
          class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-6 py-2 rounded-lg transition">
          儲存
        </button>
      </div>
      <p id="renameMsg" class="text-sm hidden"></p>
    </section>
    <!-- Log panel -->
    <section class="bg-gray-900 rounded-2xl shadow-xl px-6 py-5 space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">📝 裝置操作日誌</h2>
        <div class="flex items-center gap-3">
          <select id="logSerial"
            class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
            <option value="">— 選擇裝置 —</option>
          </select>
          <button id="clearLogBtn"
            class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-3 py-1.5 rounded-lg transition">
            清除顯示
          </button>
        </div>
      </div>
      <div id="logBox"
        class="bg-gray-950 rounded-xl p-4 h-64 overflow-y-auto font-mono text-xs space-y-1 border border-gray-800">
        <p class="text-gray-600">選擇裝置後會自動顯示日誌…</p>
      </div>
    </section>
  </main>

  <script>
    // ------------------------------------------------------------------ //
    //  Utility
    // ------------------------------------------------------------------ //
    function showStatus(msg, isError = false) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = `px-4 py-2 rounded-lg text-sm ${isError
        ? 'bg-red-900 text-red-200'
        : 'bg-blue-800 text-blue-100'}`;
      bar.classList.remove('hidden');
      setTimeout(() => bar.classList.add('hidden'), 3500);
    }

    // ------------------------------------------------------------------ //
    //  Fetch & render devices
    // ------------------------------------------------------------------ //
    async function loadDevices() {
      try {
        const res = await fetch('/devices');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderTable(data.devices || []);
      } catch (err) {
        showStatus('無法取得裝置列表：' + err.message, true);
      }
    }

    function renderTable(devices) {
      const tbody = document.getElementById('deviceTableBody');
      const count = document.getElementById('deviceCount');

      count.textContent = `共 ${devices.length} 台裝置`;

      if (devices.length === 0) {
        tbody.innerHTML = `<tr>
          <td colspan="7" class="text-center py-10 text-gray-500">
            目前沒有已連接的裝置。請確認 ADB 已啟動並且裝置已連線。
          </td>
        </tr>`;
        return;
      }

      tbody.innerHTML = devices.map(d => {
        const isDone = !d.running && d.status && d.status.startsWith('完成');
        const isTogglePending = _pendingToggles.has(d.serial);

        let badge;
        if (d.running) {
          badge = `<span class="inline-block bg-green-700 text-green-100 text-xs px-2 py-0.5 rounded-full">執行中</span>`;
        } else if (isDone) {
          badge = `<span class="inline-block bg-orange-700 text-orange-100 text-xs px-2 py-0.5 rounded-full">今日已達上限</span>`;
        } else {
          badge = `<span class="inline-block bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded-full">閒置</span>`;
        }

        const toggleLabel = isTogglePending
          ? `<span class="inline-flex items-center gap-2">
              <span class="inline-block w-3 h-3 border-2 border-white/70 border-t-transparent rounded-full animate-spin"></span>
              處理中
            </span>`
          : (d.running ? '⏹ 停止' : '▶ 啟動');
        const toggleClass = isTogglePending
          ? 'bg-gray-600 cursor-not-allowed opacity-80'
          : (d.running
            ? 'bg-red-600 hover:bg-red-700'
            : 'bg-green-600 hover:bg-green-700');

        const rowClass = isDone
          ? 'border-t border-gray-800 bg-orange-950/30'
          : 'border-t border-gray-800 hover:bg-gray-800/50 transition';

        return `<tr class="${rowClass}">
          <td class="px-6 py-4 font-medium">${escHtml(d.nickname)}</td>
          <td class="px-6 py-4 font-mono text-gray-400 text-xs">${escHtml(d.serial)}</td>
          <td class="px-6 py-4">
            ${badge}
            <span class="ml-2 text-xs text-gray-500">${escHtml(d.status)}</span>
          </td>
          <td class="px-6 py-4 text-center font-semibold text-orange-300">${d.coins_collected ?? 0}</td>
          <td class="px-6 py-4 text-center text-gray-300">${d.streams_visited ?? 0}</td>
          <td class="px-6 py-4">
            <button onclick="toggleBot('${escHtml(d.serial)}')"
              ${isTogglePending ? 'disabled' : ''}
              class="${toggleClass} text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition min-w-20">
              ${toggleLabel}
            </button>
          </td>
          <td class="px-6 py-4">
            <button onclick="prefillRename('${escHtml(d.serial)}', '${escHtml(d.nickname)}')"
              class="bg-gray-700 hover:bg-gray-600 text-gray-200 text-xs px-3 py-1.5 rounded-lg transition">
              改名
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ------------------------------------------------------------------ //
    //  Toggle bot
    // ------------------------------------------------------------------ //
    const _pendingToggles = new Set();

    async function toggleBot(serial) {
      if (_pendingToggles.has(serial)) return;
      _pendingToggles.add(serial);
      loadDevices();

      try {
        const res = await fetch('/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ serial }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
        showStatus(`${serial}：${data.running ? '已啟動' : '已停止'}`);
      } catch (err) {
        showStatus('操作失敗：' + err.message, true);
      } finally {
        _pendingToggles.delete(serial);
        loadDevices();
      }
    }

    // ------------------------------------------------------------------ //
    //  Rename
    // ------------------------------------------------------------------ //
    function prefillRename(serial, nickname) {
      const section = document.getElementById('renameSection');
      section.classList.remove('hidden');
      document.getElementById('renameSerial').value = serial;
      document.getElementById('renameNickname').value = nickname;
      document.getElementById('renameNickname').focus();
    }

    document.getElementById('renameBtn').addEventListener('click', async () => {
      const serial = document.getElementById('renameSerial').value.trim();
      const nickname = document.getElementById('renameNickname').value.trim();
      const msg = document.getElementById('renameMsg');

      if (!serial || !nickname) {
        msg.textContent = '請填寫 ADB ID 與新名稱。';
        msg.className = 'text-sm text-red-400';
        msg.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/rename', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ serial, nickname }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);

        msg.textContent = `✅ 已將 ${serial} 更名為「${nickname}」`;
        msg.className = 'text-sm text-green-400';
        msg.classList.remove('hidden');
        loadDevices();
      } catch (err) {
        msg.textContent = '儲存失敗：' + err.message;
        msg.className = 'text-sm text-red-400';
        msg.classList.remove('hidden');
      }
    });

    // ------------------------------------------------------------------ //
    //  Refresh button & auto-refresh every 5 s
    // ------------------------------------------------------------------ //
    document.getElementById('refreshBtn').addEventListener('click', loadDevices);
    loadDevices();
    setInterval(loadDevices, 5000);

    // ------------------------------------------------------------------ //
    //  Log panel
    // ------------------------------------------------------------------ //
    let _logSerial = '';
    let _logLines  = [];   // rendered log entries (deduplication)

    function populateLogSelector(devices) {
      const sel = document.getElementById('logSerial');
      const prev = sel.value;
      sel.innerHTML = '<option value="">— 選擇裝置 —</option>';
      devices.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.serial;
        opt.textContent = `${d.nickname}  (${d.serial})`;
        if (d.serial === prev) opt.selected = true;
        sel.appendChild(opt);
      });
      if (!prev && devices.length > 0) {
        // auto-select the first running device if any
        const running = devices.find(d => d.running);
        if (running) sel.value = running.serial;
      }
      _logSerial = sel.value;
    }

    async function pollLogs() {
      _logSerial = document.getElementById('logSerial').value;
      if (!_logSerial) return;

      try {
        const res = await fetch(`/logs/${encodeURIComponent(_logSerial)}`);
        if (!res.ok) return;
        const data = await res.json();
        renderLogs(data.logs || []);
      } catch (_) {}
    }

    function renderLogs(logs) {
      const box = document.getElementById('logBox');
      if (logs.length === 0) {
        box.innerHTML = '<p class="text-gray-600">這台裝置還沒有日誌記錄。</p>';
        return;
      }

      const ifaceColor = iface => {
        if (iface === 'p1') return 'text-blue-400';
        if (iface === 'p2') return 'text-purple-400';
        return 'text-gray-500';
      };
      const ifaceBadge = iface =>
        iface ? `<span class="${ifaceColor(iface)} font-bold mr-1">[${iface.toUpperCase()}]</span>` : '';

      box.innerHTML = logs.slice().reverse().map(e =>
        `<div class="flex gap-2">
          <span class="text-gray-600 shrink-0">${escHtml(e.ts)}</span>
          ${ifaceBadge(e.iface)}
          <span class="text-gray-200">${escHtml(e.msg)}</span>
        </div>`
      ).join('');
    }

    document.getElementById('logSerial').addEventListener('change', () => {
      _logLines = [];
      document.getElementById('logBox').innerHTML =
        '<p class="text-gray-600">載入中…</p>';
      pollLogs();
    });

    document.getElementById('clearLogBtn').addEventListener('click', async () => {
      const serial = document.getElementById('logSerial').value;
      const box = document.getElementById('logBox');

      if (!serial) {
        box.innerHTML = '<p class="text-gray-600">請先選擇裝置。</p>';
        return;
      }

      try {
        const res = await fetch(`/logs/${encodeURIComponent(serial)}`, {
          method: 'DELETE'
        });

        if (!res.ok) throw new Error('刪除失敗');

        _logLines = [];
        box.innerHTML = '<p class="text-gray-600">已清除顯示並刪除歷史日誌。</p>';
      } catch (_) {
        box.innerHTML = '<p class="text-red-400">清除失敗，請稍後再試。</p>';
      }
    });

    // Poll logs every 2 s
    setInterval(pollLogs, 2000);

    // Hook into loadDevices to update selector
    const _origRenderTable = renderTable;
    window.renderTable = function(devices) {
      _origRenderTable(devices);
      populateLogSelector(devices);
    };
  </script>
</body>
</html>
