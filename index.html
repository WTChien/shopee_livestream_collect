<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shopee Live — Light Wireframe</title>
  <style>
    :root {
      --bg:      oklch(99% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg:      oklch(18% 0.012 250);
      --muted:   oklch(54% 0.012 250);
      --border:  oklch(92% 0.005 250);
      --accent:  oklch(58% 0.18 255);

      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;

      --radius: 12px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font-body);
      background:color-mix(in srgb, var(--bg) 80%, white);
      color:var(--fg);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.35;
      padding:24px;
    }

    .container{max-width:1000px;margin:0 auto}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 8px;background:var(--surface);border-bottom:1px solid var(--border);border-radius:8px}
    header h1{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-0.01em;margin:0}
    header .actions{display:flex;gap:8px;align-items:center}
    .btn{border:1px solid transparent;padding:8px 12px;border-radius:8px;background:transparent;color:var(--fg);cursor:pointer}
    .btn.primary{background:color-mix(in srgb,var(--accent) 10%, white);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 8%, white);}

    main{margin-top:18px;display:grid;grid-template-columns:1fr;gap:18px}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
    .card h2{margin:0 0 8px 0;font-size:15px;font-weight:600;color:var(--fg)}
    .muted{color:var(--muted);font-size:13px}

    /* table */
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{font-size:12px;text-align:left;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.04em}
    tbody td{padding:12px;border-bottom:1px solid color-mix(in srgb,var(--border) 30%, white)}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px}
    .badge.green{background:color-mix(in srgb,#0f9d58 12%, white);color:#0f9d58}
    .badge.gray{background:color-mix(in srgb,var(--border) 6%, white);color:var(--muted)}

    /* rename form */
    .row{display:flex;gap:8px}
    .row input{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent}

    /* log box */
    .log{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, 'Roboto Mono', monospace;background:color-mix(in srgb,var(--border) 6%, white);padding:12px;border-radius:10px;height:240px;overflow:auto;font-size:12px;color:var(--muted)}

    /* responsive */
    @media (min-width:720px){main{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚙️ Shopee Live 控制面板 — Light</h1>
      <div class="actions">
        <button class="btn">⤴︎ 匯出日誌</button>
        <button class="btn primary">🔄 重新整理裝置</button>
      </div>
    </header>

    <main>
      <section class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <h2>已連接裝置</h2>
          <div class="muted">共 0 台裝置</div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>自訂名稱</th>
                <th>ADB ID</th>
                <th>狀態</th>
                <th>蒐集次數</th>
                <th>直播間數</th>
                <th>自動化</th>
                <th>改名</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="7" class="muted">— 暫無已連接裝置 —</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section id="renameSection" class="card" style="display:none">
        <h2>更新裝置名稱</h2>
        <div class="row" style="margin-bottom:8px">
          <input placeholder="ADB ID（例：70f5e12）" />
          <input placeholder="新名稱（例：老媽的小米）" />
          <button class="btn primary">儲存</button>
        </div>
        <p class="muted">點選表格內改名按鈕以顯示並預填表單。</p>
      </section>

      <section class="card">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <h2>裝置操作日誌</h2>
          <div class="muted" style="font-size:13px">選擇裝置以查看</div>
        </div>
        <div class="log">選擇裝置後會顯示日誌…</div>
      </section>
    </main>

    <footer style="margin-top:18px;text-align:center;color:var(--muted);font-size:13px">Wireframe · 現為預覽樣式</footer>
  </div>
</body>
</html>
